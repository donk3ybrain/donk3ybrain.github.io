<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Campus Navigation Graph Builder</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
body{margin:0;font-family:Arial,sans-serif}
#bar{background:#005696;color:#fff;padding:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
button,input,select{padding:6px}
#map{height:calc(100vh - 58px)}
/* Tooltip for snap-distance warnings */
.snap-warn{color:#ffcc44;font-weight:bold;margin-left:4px}
</style>
</head>
<body>
<div id="bar">
  <button id="export">Export Graph</button>
  <button id="snap">Snap Buildings</button>
  <button id="precompute">Precompute All Routes</button>
  <button id="test">Test Route</button>
  <button id="clear">Clear</button>
  <select id="start"></select>
  <select id="end"></select>
  <span id="status">Ready — click map to place nodes, click two nodes to connect them, Esc to cancel</span>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const BUILDINGS = [
  { name: "Allied Health Center - Main", coords: [39.782878, -75.1230191] },
  { name: "Behavioral Sciences - E", coords: [39.7796022, -75.1209136] },
  { name: "Behavioral Sciences - W", coords: [39.7795505, -75.1216443] },
  { name: "Behavioral Sciences - S", coords: [39.7794936, -75.1210346] },
  { name: "Bookstore - Main", coords: [39.7809695688, -75.1218239547] },
  { name: "Bus Stop - Main", coords: [39.77908331922, -75.1236362179] },
  { name: "Business & Corporate - SE", coords: [39.7799038, -75.1195415] },
  { name: "Business & Corporate - SW", coords: [39.7797477, -75.1197277] },
  { name: "Business & Corporate - W", coords: [39.7801545, -75.1200946] },
  { name: "College Center - N", coords: [39.7815536, -75.1212767] },
  { name: "College Center - S", coords: [39.7812599, -75.1210383] },
  { name: "College Center - E", coords: [39.7813882, -75.1208947] },
  { name: "College Center - W", coords: [39.7813314, -75.1215967] },
  { name: "Education & Humanities - SE", coords: [39.780637022792895, -75.11993200403573] },
  { name: "Education & Humanities - SW", coords: [39.78071845901651, -75.1205004889838] },
  { name: "Education & Humanities - NE", coords: [39.7812582, -75.119765] },
  { name: "Education & Humanities - NW", coords: [39.78119354943093, -75.12068271095362] },
  { name: "Education & Humanities - N", coords: [39.78129277757268, -75.12056613082852] },
  { name: "Health Sciences - NW", coords: [39.779727487636855, -75.12525653609163] },
  { name: "Health Sciences - SW", coords: [39.779601317, -75.125094405] },
  { name: "Law & Justice - W", coords: [39.7815494, -75.123452] },
  { name: "Law & Justice - E", coords: [39.78168391125, -75.1227306679] },
  { name: "Library - NE", coords: [39.78081972333, -75.121772056] },
  { name: "Library - W", coords: [39.7807886, -75.1220539] },
  { name: "Library - SE", coords: [39.7805522, -75.1216513] },
  { name: "Math & Engineering - E", coords: [39.7799327, -75.1219634] },
  { name: "Math & Engineering - W", coords: [39.77973668357437, -75.12230303275209] },
  { name: "Math & Engineering - N", coords: [39.7801541, -75.1224021] },
  { name: "Math & Engineering - S", coords: [39.7796644, -75.121962] },
  { name: "Medical Arts - W", coords: [39.7816786, -75.1196886] },
  { name: "Medical Arts - E", coords: [39.78180729877389, -75.11955494669739] },
  { name: "Nursing & Health Professions - E", coords: [39.779229, -75.1205182] },
  { name: "Nursing & Health Professions - W", coords: [39.7790224, -75.1209711] },
  { name: "Physical Education - W", coords: [39.7819436448, -75.1226972811] },
  { name: "Physical Education - S", coords: [39.781781036, -75.1227098609] },
  { name: "Roadrunner Cafe - Main", coords: [39.78150828, -75.1208635] },
  { name: "Scott Hall - SE", coords: [39.7807653, -75.1224492] },
  { name: "Scott Hall - NE", coords: [39.7811138, -75.1226172] },
  { name: "Scott Hall - W", coords: [39.7806277, -75.1231511] },
  { name: "Scott Hall - S", coords: [39.7804118, -75.1225503] },
  { name: "Scott Hall - NW", coords: [39.781022, -75.1237656] },
  { name: "Security - Main", coords: [39.78240664169, -75.1236159465] },
  { name: "Student Services - E", coords: [39.780066, -75.1207621] },
  { name: "Student Services - NW", coords: [39.7802322, -75.1213217] },
  { name: "Student Services - SW", coords: [39.7801584, -75.1213155] },
  { name: "Student Services - N", coords: [39.7805153, -75.1209092] },
  { name: "Technical Support - Main", coords: [39.78071845901651, -75.1205004889838] },
  { name: "Together Cafe Too - Main", coords: [39.7805522, -75.1216513] },
  { name: "Tutoring / Academic Support - Main", coords: [39.7807886, -75.1220539] }
];

// ─── Snap distance warning threshold (metres) ──────────────────────────────
const SNAP_WARN_M = 50;

const map = L.map('map').setView([39.780833, -75.121667], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

let nodes = [], edges = [], snaps = {}, nextId = 1, selected = null, pathLayer = null;
let precomputedRoutes = {}; // keyed "BuildingA||BuildingB" (canonical: A < B alphabetically)

// ─── Haversine distance (metres) ───────────────────────────────────────────
function dist(a, b) {
  const R = 6371000, p = Math.PI / 180;
  const dLat = (b[0] - a[0]) * p, dLng = (b[1] - a[1]) * p;
  const la1 = a[0] * p, la2 = b[0] * p;
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

const status = document.getElementById('status');

// Building reference markers (static, never removed)
BUILDINGS.forEach(b => {
  L.circleMarker(b.coords, { radius: 4, color: 'red' })
    .bindTooltip(b.name).addTo(map);
});

function refreshLists() {
  const s = document.getElementById('start');
  const e = document.getElementById('end');
  s.innerHTML = ''; e.innerHTML = '';
  BUILDINGS.forEach(b => {
    s.add(new Option(b.name, b.name));
    e.add(new Option(b.name, b.name));
  });
}

// ─── Redraw all graph layers ────────────────────────────────────────────────
// FIX 3: selected node is rendered in a distinct colour so the user can see
//         which node is awaiting a second click.
function redraw() {
  map.eachLayer(l => { if (l._graphTemp) map.removeLayer(l); });

  edges.forEach(ed => {
    const a = nodes.find(n => n.id === ed.from);
    const b = nodes.find(n => n.id === ed.to);
    if (!a || !b) return;
    const line = L.polyline([[a.lat, a.lng], [b.lat, b.lng]], { color: '#3388ff', weight: 2 });
    line._graphTemp = true;
    line.addTo(map);

    // FIX 2: delete by object reference, not array index.
    // The original code used edges.splice(i, 1) where i was the forEach index —
    // safe in simple cases but fragile if the array is mutated between redraws.
    line.on('contextmenu', () => {
      edges = edges.filter(x => x !== ed);
      redraw();
    });
  });

  nodes.forEach(n => {
    const isPending = n.id === selected;
    const m = L.circleMarker([n.lat, n.lng], {
      radius: isPending ? 8 : 5,
      color: isPending ? '#ff7800' : '#3388ff',
      fillColor: isPending ? '#ff7800' : '#3388ff',
      fillOpacity: 1,
      weight: isPending ? 2 : 1
    });
    m._graphTemp = true;
    m.addTo(map).bindTooltip(n.id, { permanent: true, direction: 'top' });

    m.on('click', ev => {
      L.DomEvent.stopPropagation(ev);
      if (!selected) {
        selected = n.id;
        redraw(); // FIX 3: redraw immediately so the orange highlight appears
        return;
      }
      if (selected !== n.id) {
        // FIX 4: prevent duplicate edges
        const duplicate = edges.some(e =>
          (e.from === selected && e.to === n.id) ||
          (e.from === n.id && e.to === selected)
        );
        if (!duplicate) edges.push({ from: selected, to: n.id });
      }
      selected = null;
      redraw();
    });

    m.on('contextmenu', () => {
      nodes = nodes.filter(x => x.id !== n.id);
      edges = edges.filter(x => x.from !== n.id && x.to !== n.id);
      if (selected === n.id) selected = null;
      redraw();
    });
  });

  const pendingHint = selected ? ` — click another node to connect, or Esc to cancel` : '';
  status.textContent = `${nodes.length} nodes, ${edges.length} edges${pendingHint}`;
}

// FIX 5: Escape cancels a pending node selection
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && selected) {
    selected = null;
    redraw();
  }
});

map.on('click', e => {
  nodes.push({ id: 'N' + nextId++, lat: e.latlng.lat, lng: e.latlng.lng });
  redraw();
});

// ─── Snap buildings to nearest node ────────────────────────────────────────
// FIX 6: warn when a building's nearest node is beyond SNAP_WARN_M metres
function snapBuildings() {
  if (nodes.length === 0) { alert('Place some nodes on the map first.'); return; }
  snaps = {};
  const warnings = [];

  BUILDINGS.forEach(b => {
    let best = null, dmin = 1e9;
    nodes.forEach(n => {
      const d = dist(b.coords, [n.lat, n.lng]);
      if (d < dmin) { dmin = d; best = n.id; }
    });
    snaps[b.name] = { node: best, distance: dmin };
    if (dmin > SNAP_WARN_M) warnings.push(`  • ${b.name} (${Math.round(dmin)} m away)`);
  });

  let msg = 'Buildings snapped to nearest graph node.';
  if (warnings.length) {
    msg += `\n\n⚠️ ${warnings.length} building(s) are more than ${SNAP_WARN_M} m from any node — routes through these may be inaccurate:\n`;
    msg += warnings.slice(0, 8).join('\n');
    if (warnings.length > 8) msg += `\n  …and ${warnings.length - 8} more`;
  }
  alert(msg);
}

// ─── Bidirectional adjacency ────────────────────────────────────────────────
function neighbors(id) {
  const out = [];
  edges.forEach(e => {
    if (e.from === id) out.push(e.to);
    if (e.to === id) out.push(e.from);
  });
  return out;
}

// ─── True A* (was Dijkstra — missing heuristic) ────────────────────────────
// FIX 1: sort by f = g + h where h = haversine distance to goal node.
// Also uses a Set for the open list membership check (O(1) vs O(n)).
function astar(startId, endId) {
  const goal = nodes.find(x => x.id === endId);
  if (!goal) return null;

  const openSet = new Set([startId]);
  const came = {};
  const g = { [startId]: 0 };

  function f(id) {
    const n = nodes.find(x => x.id === id);
    return g[id] + dist([n.lat, n.lng], [goal.lat, goal.lng]);
  }

  while (openSet.size) {
    // Pick node with lowest f score
    let cur = null;
    for (const id of openSet) {
      if (cur === null || f(id) < f(cur)) cur = id;
    }

    if (cur === endId) {
      const path = [cur];
      let c = cur;
      while (came[c]) { c = came[c]; path.unshift(c); }
      return path;
    }

    openSet.delete(cur);
    const curNode = nodes.find(x => x.id === cur);

    neighbors(cur).forEach(nbId => {
      const nbNode = nodes.find(x => x.id === nbId);
      const ng = g[cur] + dist([curNode.lat, curNode.lng], [nbNode.lat, nbNode.lng]);
      if (g[nbId] === undefined || ng < g[nbId]) {
        g[nbId] = ng;
        came[nbId] = cur;
        openSet.add(nbId);
      }
    });
  }
  return null;
}

// ─── Route cache helpers ────────────────────────────────────────────────────
// Keys are always stored with the alphabetically-first building name first,
// so lookups work regardless of which direction the user picks in the UI.
function routeKey(a, b) {
  return a < b ? `${a}||${b}` : `${b}||${a}`;
}

function pathDistanceMeters(path) {
  return path.reduce((sum, id, i) => {
    if (i === 0) return 0;
    const a = nodes.find(x => x.id === path[i - 1]);
    const b = nodes.find(x => x.id === id);
    return sum + dist([a.lat, a.lng], [b.lat, b.lng]);
  }, 0);
}

// ─── Precompute every building-pair route ───────────────────────────────────
// 49 buildings → 49×48/2 = 1,176 unique pairs.
// Runs synchronously (each A* call on a campus-scale graph takes <1 ms).
// Results are stored in precomputedRoutes and included in the export so the
// consumer app never needs to run pathfinding — it's a plain lookup table.
function precomputeAllRoutes() {
  if (Object.keys(snaps).length === 0) {
    alert('Click "Snap Buildings" first so every building has a graph node.');
    return;
  }

  status.textContent = 'Computing all routes…';
  precomputedRoutes = {};

  const names = BUILDINGS.map(b => b.name);
  let computed = 0, failed = 0;
  const t0 = performance.now();

  for (let i = 0; i < names.length; i++) {
    for (let j = i + 1; j < names.length; j++) {
      const from = names[i], to = names[j];
      const fromNode = snaps[from]?.node;
      const toNode   = snaps[to]?.node;

      if (!fromNode || !toNode) { failed++; continue; }

      // Same node (two buildings share the same nearest graph node)
      if (fromNode === toNode) {
        const key = routeKey(from, to);
        precomputedRoutes[key] = {
          nodeIds: [fromNode],
          coords: [[ nodes.find(x => x.id === fromNode).lat,
                     nodes.find(x => x.id === fromNode).lng ]],
          distanceMeters: 0
        };
        computed++;
        continue;
      }

      const path = astar(fromNode, toNode);
      if (!path) { failed++; continue; }

      const coords = path.map(id => {
        const n = nodes.find(x => x.id === id);
        return [n.lat, n.lng];
      });

      precomputedRoutes[routeKey(from, to)] = {
        nodeIds: path,
        coords,
        distanceMeters: Math.round(pathDistanceMeters(path))
      };
      computed++;
    }
  }

  const ms = Math.round(performance.now() - t0);
  const total = names.length * (names.length - 1) / 2;
  let msg = `✓ ${computed}/${total} routes precomputed in ${ms} ms.`;
  if (failed > 0) msg += ` ⚠️ ${failed} pair(s) unreachable — check graph connectivity.`;
  status.textContent = msg;
  alert(msg + (computed > 0 ? '\n\nClick "Export Graph" to save the full route table.' : ''));
}

// ─── Button handlers ────────────────────────────────────────────────────────
document.getElementById('snap').onclick = snapBuildings;
document.getElementById('precompute').onclick = precomputeAllRoutes;

document.getElementById('test').onclick = () => {
  if (Object.keys(snaps).length === 0) { alert('Click "Snap Buildings" first.'); return; }
  const s = document.getElementById('start').value;
  const e = document.getElementById('end').value;
  if (s === e) { alert('Start and end must be different buildings.'); return; }
  if (!snaps[s]?.node || !snaps[e]?.node) { alert('One or both buildings have no snapped node.'); return; }

  let pts, totalDist, nodeCount, source;

  // ── Use precomputed cache if available (O(1) lookup) ──
  const cached = precomputedRoutes[routeKey(s, e)];
  if (cached) {
    // Reverse coords if needed so they always read start → end
    const forward = cached.nodeIds[0] === snaps[s].node;
    pts        = forward ? cached.coords : [...cached.coords].reverse();
    totalDist  = cached.distanceMeters;
    nodeCount  = cached.nodeIds.length;
    source     = 'precomputed';
  } else {
    // ── Fall back to live A* ──
    const p = astar(snaps[s].node, snaps[e].node);
    if (!p) { alert('No route found — make sure the graph is fully connected between these buildings.'); return; }
    pts       = p.map(id => { const n = nodes.find(x => x.id === id); return [n.lat, n.lng]; });
    totalDist = Math.round(pathDistanceMeters(p));
    nodeCount = p.length;
    source    = 'live A*';
  }

  if (pathLayer) map.removeLayer(pathLayer);
  pathLayer = L.polyline(pts, { color: '#e6550d', weight: 6, opacity: 0.85 });
  pathLayer.addTo(map);
  map.fitBounds(pathLayer.getBounds(), { padding: [40, 40] });
  status.textContent = `Route: ${s} → ${e} | ${nodeCount} nodes | ${totalDist} m | via ${source}`;
};

document.getElementById('export').onclick = () => {
  const exportEdges = edges.map(e => {
    const a = nodes.find(n => n.id === e.from);
    const b = nodes.find(n => n.id === e.to);
    return {
      from: e.from, to: e.to,
      lengthMeters: Math.round(dist([a.lat, a.lng], [b.lat, b.lng]))
    };
  });

  const routeCount = Object.keys(precomputedRoutes).length;
  if (routeCount === 0) {
    const go = confirm(
      'No precomputed routes found.\n\n' +
      'Export will include the raw graph only (consumers will need to run A* themselves).\n\n' +
      'Click OK to export anyway, or Cancel to run "Precompute All Routes" first.'
    );
    if (!go) return;
  }

  const data = {
    nodes,
    edges: exportEdges,
    buildingNodeMap: snaps,
    precomputedRoutes   // {} if not yet computed — consumers can detect this
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'campus-navigation-graph.json';
  a.click();
  status.textContent = `Exported — ${nodes.length} nodes, ${edges.length} edges, ${routeCount} precomputed routes.`;
};

document.getElementById('clear').onclick = () => {
  nodes = []; edges = []; snaps = {}; nextId = 1; selected = null;
  precomputedRoutes = {};
  if (pathLayer) { map.removeLayer(pathLayer); pathLayer = null; }
  redraw();
};

refreshLists();
redraw();
</script>
</body>
</html>
