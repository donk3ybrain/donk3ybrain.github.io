<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Matrix Rain Exporter</title>

<style>
  body {
    background: #000;
    color: #0f0;
    font-family: sans-serif;
    margin: 0;
    padding: 10px;
  }
  #controls {
    display: flex;
    gap: 20px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  canvas {
    border: 1px solid #0f0;
    image-rendering: pixelated;
  }
</style>

<!-- Inline GIF worker (fixes MIME/CORS issues) -->
<script id="gif-worker" type="javascript/worker">
  importScripts('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js');
</script>

<!-- Main GIF.js library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

</head>
<body>

<div id="controls">
  <label>Font Size:
    <input type="range" id="sizeSlider" min="6" max="20" step="1" value="10">
  </label>

  <label>Speed:
    <input type="range" id="speedSlider" min="10" max="300" step="5" value="70">
  </label>

  <button id="exportBtn">Export PNG Frames</button>
  <button id="exportGifBtn">Export GIF</button>
</div>

<canvas id="matrix" width="240" height="135"></canvas>

<script>
/* -------------------------
   CANVAS
--------------------------*/
const width = 240;
const height = 135;
const fps = 30;

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

/* -------------------------
   MATRIX CHARACTER SET
--------------------------*/
const matrixChars =
  "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜｦﾝ" +
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

/* -------------------------
   STATE
--------------------------*/
let fontSize = 10;
let speed = 70;
let columns;
let totalFrames;
let columnStreams = [];

/* -------------------------
   INITIALIZE STREAMS
--------------------------*/
function initStreams() {
  columns = Math.floor(width / fontSize);

  columnStreams = [];
  for (let i = 0; i < columns; i++) {
    const streamLength = Math.ceil(height / fontSize) + 5;
    const chars = [];

    for (let j = 0; j < streamLength; j++) {
      chars.push(matrixChars[Math.floor(Math.random() * matrixChars.length)]);
    }

    columnStreams.push({
      x: i * fontSize,
      chars,
      offset: Math.floor(Math.random() * height)
    });
  }

  totalFrames = Math.max(1, Math.floor((height / speed) * fps));
}

/* -------------------------
   DRAW FRAME
--------------------------*/
function drawFrame(frame) {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, width, height);

  ctx.font = `${fontSize}px monospace`;

  const progress = (frame / totalFrames) * height;

  for (const stream of columnStreams) {
    for (let i = 0; i < stream.chars.length; i++) {
      const y = (progress + stream.offset + i * fontSize) % height;
      const alpha = 1 - i * 0.07;

      ctx.fillStyle = `rgba(0, 255, 0, ${alpha})`;
      ctx.fillText(stream.chars[i], stream.x, y);
    }
  }
}

/* -------------------------
   LIVE ANIMATION
--------------------------*/
let liveFrame = 0;
function animate() {
  drawFrame(liveFrame);
  liveFrame = (liveFrame + 1) % totalFrames;
  requestAnimationFrame(animate);
}

/* -------------------------
   SLIDERS
--------------------------*/
document.getElementById("sizeSlider").addEventListener("input", e => {
  fontSize = Number(e.target.value);
  initStreams();
  liveFrame = 0;
});

document.getElementById("speedSlider").addEventListener("input", e => {
  speed = Number(e.target.value);
  totalFrames = Math.max(1, Math.floor((height / speed) * fps));
  liveFrame = 0;
});

/* -------------------------
   EXPORT PNG FRAMES
--------------------------*/
document.getElementById("exportBtn").addEventListener("click", async () => {
  for (let frame = 0; frame < totalFrames; frame++) {
    drawFrame(frame);
    await new Promise(r => setTimeout(r, 10));

    const link = document.createElement("a");
    link.download = `frame_${String(frame).padStart(3, "0")}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  }
  alert("Export complete!");
});

/* -------------------------
   EXPORT GIF (inline worker)
--------------------------*/
document.getElementById("exportGifBtn").addEventListener("click", async () => {
  const workerBlob = new Blob(
    [document.querySelector('#gif-worker').textContent],
    { type: "application/javascript" }
  );
  const workerURL = URL.createObjectURL(workerBlob);

  const gif = new GIF({
    workers: 1,
    workerScript: workerURL,
    quality: 10,
    repeat: 0
  });

  for (let frame = 0; frame < totalFrames; frame++) {
    drawFrame(frame);

    gif.addFrame(canvas, {
      copy: true,
      delay: 1000 / fps
    });

    await new Promise(r => setTimeout(r, 5));
  }

  gif.on("finished", blob => {
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "matrix.gif";
    link.click();
    URL.revokeObjectURL(url);
  });

  gif.render();
});

/* -------------------------
   START
--------------------------*/
initStreams();
animate();
</script>

</body>
</html>
