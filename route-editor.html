<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Route Editor — RCSJ Campus Map</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root {
      --blue:   #005696;
      --gold:   #edab1e;
      --light:  #eef4fa;
      --muted:  #6b8099;
      --ok:     #1e9e5a;
      --err:    #c0392b;
      --border: #c5d8e8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */

    header {
      background: var(--blue);
      color: white;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      z-index: 1000;
    }

    header h1 { font-size: 1rem; font-weight: 700; }

    #header-stats {
      flex: 1;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.65);
    }

    /* ── Layout ───────────────────────────────────────────────────────────── */

    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */

    .sidebar {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: white;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 0.65rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    label.file-btn {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--light);
      color: var(--blue);
      border: 1.5px solid var(--border);
      transition: background 0.15s;
      align-self: flex-start;
    }
    label.file-btn:hover { background: #d4e8f8; }
    #file-input { display: none; }

    #search-input {
      padding: 0.38rem 0.6rem;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 0.8rem;
      outline: none;
      width: 100%;
    }
    #search-input:focus { border-color: var(--blue); }

    .filter-tabs { display: flex; gap: 0.25rem; flex-wrap: wrap; }

    .filter-tab {
      padding: 0.2rem 0.55rem;
      font-size: 0.7rem;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      background: var(--light);
      color: var(--muted);
      border: none;
      transition: all 0.15s;
    }
    .filter-tab.active { background: var(--blue); color: white; }

    /* ── Route list ───────────────────────────────────────────────────────── */

    #route-list { flex: 1; overflow-y: auto; }

    .group-header {
      padding: 0.35rem 0.65rem;
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--light);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .route-item {
      padding: 0.45rem 0.65rem;
      cursor: pointer;
      border-bottom: 1px solid #f0f4f8;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.1s;
    }
    .route-item:hover   { background: var(--light); }
    .route-item.selected { background: #d5e8f8; }

    .route-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-ok   { background: var(--ok); }
    .dot-null { background: var(--err); }

    .route-name {
      flex: 1;
      font-size: 0.77rem;
      color: #222;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .route-dist { font-size: 0.7rem; color: var(--muted); flex-shrink: 0; }

    /* ── Map ──────────────────────────────────────────────────────────────── */

    .map-area { flex: 1; position: relative; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    /* ── Bottom toolbar ───────────────────────────────────────────────────── */

    #bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.97);
      border-top: 1px solid var(--border);
      padding: 0.55rem 0.9rem;
      display: none;
      align-items: center;
      gap: 0.6rem;
      z-index: 500;
      backdrop-filter: blur(4px);
    }

    #info-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }

    #info-meta { font-size: 0.7rem; color: var(--muted); }

    .info-block { flex: 1; min-width: 0; }

    button {
      padding: 0.38rem 0.8rem;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.35; cursor: default; }
    button:not(:disabled):hover { opacity: 0.8; }

    .btn-primary { background: var(--blue);  color: white; }
    .btn-gold    { background: var(--gold);  color: white; }
    .btn-light   { background: var(--light); color: var(--blue); }
    .btn-danger  { background: #fee; color: var(--err); }

    /* ── Toast ────────────────────────────────────────────────────────────── */

    #toast {
      position: fixed;
      top: 3rem;
      right: 1rem;
      background: #1a2b3c;
      color: white;
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      font-size: 0.78rem;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* ── Empty state ──────────────────────────────────────────────────────── */

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 0.4rem;
      color: var(--muted);
      font-size: 0.82rem;
      padding: 1.5rem;
      text-align: center;
    }
    .empty-state .icon { font-size: 2rem; }

    /* ── Leaflet overrides ────────────────────────────────────────────────── */

    .vertex-handle > div {
      width: 10px; height: 10px;
      background: white;
      border: 2.5px solid var(--blue);
      border-radius: 50%;
      cursor: grab;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }
    .ep-start > div {
      width: 13px; height: 13px;
      background: var(--ok);
      border: 2.5px solid white;
      border-radius: 50%;
      cursor: grab;
      box-shadow: 0 1px 5px rgba(0,0,0,0.4);
    }
    .ep-end > div {
      width: 13px; height: 13px;
      background: var(--err);
      border: 2.5px solid white;
      border-radius: 50%;
      cursor: grab;
      box-shadow: 0 1px 5px rgba(0,0,0,0.4);
    }
    .leaflet-marker-draggable { cursor: grab !important; }
  </style>
</head>
<body>

<header>
  <h1>🗺 RCSJ Route Editor</h1>
  <span id="header-stats">No file loaded</span>
  <button class="btn-gold" id="btn-download" disabled>⬇ Download routes.json</button>
</header>

<div id="toast"></div>

<div class="layout">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <div class="sidebar">
    <div class="sidebar-top">
      <label class="file-btn">
        📂 Load routes.json
        <input type="file" id="file-input" accept=".json,application/json" />
      </label>
      <input type="text" id="search-input" placeholder="🔍  Search routes…" />
      <div class="filter-tabs">
        <button class="filter-tab active" data-f="all">All</button>
        <button class="filter-tab"        data-f="pairs">Pairs</button>
        <button class="filter-tab"        data-f="parking">Parking</button>
        <button class="filter-tab"        data-f="null">Null only</button>
      </div>
    </div>
    <div id="route-list">
      <div class="empty-state">
        <div class="icon">📂</div>
        <div>Load a <strong>routes.json</strong> file<br>to start browsing routes.</div>
      </div>
    </div>
  </div>

  <!-- ── Map ─────────────────────────────────────────────────────────────── -->
  <div class="map-area">
    <div id="map"></div>

    <div id="bottom-bar">
      <div class="info-block">
        <div id="info-title">—</div>
        <div id="info-meta">—</div>
      </div>
      <button class="btn-primary" id="btn-refetch">↻ Re-fetch</button>
      <button class="btn-light"   id="btn-reverse">⇄ Use reverse</button>
      <button class="btn-danger"  id="btn-clear">✕ Clear</button>
    </div>
  </div>

</div>

<script>
// ── Routing API ───────────────────────────────────────────────────────────────

const ROUTE_API = "https://broken-truth-6a9a.dan-5e4.workers.dev/route";

// ── State ─────────────────────────────────────────────────────────────────────

let routeTable  = { entrancePairs: {}, parkingForBuilding: {} };
let allItems    = [];   // [{type:'pair'|'parking', key, label}]
let filtered    = [];   // current filtered+searched subset
let selectedIdx = -1;
let isDirty     = false;

// Map state
let map, polyline, vertexGroup, epStart, epEnd;
let workingCoords = null; // mutable [lng,lat][] copy of the active route's geometry

// ── Icons ─────────────────────────────────────────────────────────────────────

const mkIcon = cls => L.divIcon({
  className: cls,
  html: '<div></div>',
  iconSize:   [cls === 'vertex-handle' ? 10 : 13, cls === 'vertex-handle' ? 10 : 13],
  iconAnchor: [cls === 'vertex-handle' ?  5 :  6,  cls === 'vertex-handle' ?  5 :  6],
});

// ── Map setup ─────────────────────────────────────────────────────────────────

map = L.map('map').setView([39.7805, -75.1218], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 20,
}).addTo(map);

// ── Helpers ───────────────────────────────────────────────────────────────────

function haversine([lat1,lng1],[lat2,lng2]) {
  const R = 6_371_000, r = x => x * Math.PI / 180;
  const dLat = r(lat2-lat1), dLng = r(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function fmtDist(m) {
  return m >= 1000 ? `${(m/1000).toFixed(2)} km` : `${Math.round(m)} m`;
}

function fmtDur(s) {
  const m = Math.floor(s/60);
  return m > 0 ? `${m} min ${Math.round(s%60)} s` : `${Math.round(s)} s`;
}

let toastTimer;
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

// ── Load file ─────────────────────────────────────────────────────────────────

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.entrancePairs || !data.parkingForBuilding)
        throw new Error('Missing expected keys');
      routeTable = data;
      buildItems();
      applyFilter();
      isDirty = false;
      document.getElementById('btn-download').disabled = false;
      updateHeaderStats();
      toast(`Loaded ${file.name}`);
    } catch (err) {
      toast('⚠ Could not parse file: ' + err.message);
    }
  };
  reader.readAsText(file);
});

// ── Build item list ───────────────────────────────────────────────────────────

function buildItems() {
  allItems = [];
  for (const key of Object.keys(routeTable.entrancePairs).sort())
    allItems.push({ type: 'pair', key, entry: () => routeTable.entrancePairs[key] });
  for (const key of Object.keys(routeTable.parkingForBuilding).sort())
    allItems.push({ type: 'parking', key, entry: () => routeTable.parkingForBuilding[key] });
}

// ── Filter + search ───────────────────────────────────────────────────────────

let activeFilter = 'all';

document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.f;
    applyFilter();
  });
});

document.getElementById('search-input').addEventListener('input', applyFilter);

function applyFilter() {
  const q = document.getElementById('search-input').value.toLowerCase();
  filtered = allItems.filter(item => {
    if (activeFilter === 'pairs'   && item.type !== 'pair')    return false;
    if (activeFilter === 'parking' && item.type !== 'parking') return false;
    if (activeFilter === 'null'    && item.entry().route)      return false;
    if (q && !item.key.toLowerCase().includes(q))              return false;
    return true;
  });
  renderList();
}

// ── Render list ───────────────────────────────────────────────────────────────

function renderList() {
  const el = document.getElementById('route-list');

  if (!allItems.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📂</div><div>Load a <strong>routes.json</strong> file<br>to start browsing routes.</div></div>`;
    return;
  }

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div>No routes match your filter.</div></div>`;
    return;
  }

  // Group by type
  const pairs   = filtered.filter(i => i.type === 'pair');
  const parking = filtered.filter(i => i.type === 'parking');

  let html = '';

  if (pairs.length) {
    html += `<div class="group-header">Building pairs (${pairs.length})</div>`;
    pairs.forEach((item, i) => {
      const e    = item.entry();
      const dist = e.route?.properties?.summary?.distance;
      const idx  = filtered.indexOf(item);
      html += `
        <div class="route-item ${idx === selectedIdx ? 'selected' : ''}" data-idx="${idx}">
          <div class="route-dot ${e.route ? 'dot-ok' : 'dot-null'}"></div>
          <div class="route-name" title="${item.key}">${item.key}</div>
          <div class="route-dist">${dist ? fmtDist(dist) : 'null'}</div>
        </div>`;
    });
  }

  if (parking.length) {
    html += `<div class="group-header">Parking routes (${parking.length})</div>`;
    parking.forEach(item => {
      const e    = item.entry();
      const dist = e.route?.properties?.summary?.distance;
      const idx  = filtered.indexOf(item);
      html += `
        <div class="route-item ${idx === selectedIdx ? 'selected' : ''}" data-idx="${idx}">
          <div class="route-dot ${e.route ? 'dot-ok' : 'dot-null'}"></div>
          <div class="route-name" title="${item.key}">🅿 ${item.key}</div>
          <div class="route-dist">${dist ? fmtDist(dist) : 'null'}</div>
        </div>`;
    });
  }

  el.innerHTML = html;

  el.querySelectorAll('.route-item').forEach(row => {
    row.addEventListener('click', () => selectIdx(parseInt(row.dataset.idx)));
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────────

function updateHeaderStats() {
  const ep   = Object.values(routeTable.entrancePairs);
  const pk   = Object.values(routeTable.parkingForBuilding);
  const total = ep.length + pk.length;
  const ok    = ep.filter(v => v.route).length + pk.filter(v => v.route).length;
  const nulls = total - ok;
  document.getElementById('header-stats').textContent =
    `${ok}/${total} routes  ·  ${nulls} null${isDirty ? '  ·  ● unsaved changes' : ''}`;
}

// ── Select ────────────────────────────────────────────────────────────────────

function selectIdx(idx) {
  if (idx < 0 || idx >= filtered.length) return;
  selectedIdx = idx;
  renderList();

  // Scroll selected row into view
  const row = document.querySelector(`.route-item[data-idx="${idx}"]`);
  row?.scrollIntoView({ block: 'nearest' });

  showRoute(filtered[idx]);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (document.activeElement === document.getElementById('search-input')) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); selectIdx(selectedIdx + 1); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); selectIdx(selectedIdx - 1); }
});

// ── Clear map layers ──────────────────────────────────────────────────────────

function clearMapLayers() {
  if (polyline)     { map.removeLayer(polyline);     polyline = null; }
  if (vertexGroup)  { map.removeLayer(vertexGroup);  vertexGroup = null; }
  if (epStart)      { map.removeLayer(epStart);      epStart = null; }
  if (epEnd)        { map.removeLayer(epEnd);        epEnd = null; }
  workingCoords = null;
}

// ── Show route on map ─────────────────────────────────────────────────────────

function showRoute(item) {
  clearMapLayers();
  const entry = item.entry();

  document.getElementById('bottom-bar').style.display = 'flex';
  document.getElementById('info-title').textContent = item.key;

  // Draw endpoint markers (always show, even for null routes)
  const startCoords = entry.start?.coords ?? entry.entrance?.coords;
  const endCoords   = entry.end?.coords   ?? entry.lot?.coords;

  if (startCoords) {
    epStart = L.marker([startCoords[0], startCoords[1]], {
      icon: mkIcon('ep-start'), draggable: true, zIndexOffset: 200,
      title: 'Start (drag to move)'
    }).addTo(map);
    epStart.on('dragend', e => {
      const ll = e.target.getLatLng();
      if (entry.start)    entry.start.coords    = [ll.lat, ll.lng];
      if (entry.entrance) entry.entrance.coords = [ll.lat, ll.lng];
      markDirty();
      toast('Endpoint moved — click Re-fetch to update the route.');
    });
  }

  if (endCoords) {
    epEnd = L.marker([endCoords[0], endCoords[1]], {
      icon: mkIcon('ep-end'), draggable: true, zIndexOffset: 200,
      title: 'End (drag to move)'
    }).addTo(map);
    epEnd.on('dragend', e => {
      const ll = e.target.getLatLng();
      if (entry.end) entry.end.coords = [ll.lat, ll.lng];
      if (entry.lot) entry.lot.coords = [ll.lat, ll.lng];
      markDirty();
      toast('Endpoint moved — click Re-fetch to update the route.');
    });
  }

  if (!entry.route) {
    document.getElementById('info-meta').textContent = 'No route — drag the markers or click Re-fetch.';
    if (startCoords && endCoords) {
      const bounds = L.latLngBounds([[startCoords[0], startCoords[1]], [endCoords[0], endCoords[1]]]);
      map.fitBounds(bounds, { padding: [60, 60] });
    } else if (startCoords) {
      map.setView([startCoords[0], startCoords[1]], 18);
    }
    return;
  }

  // Draw route polyline
  const geom = entry.route.geometry;
  workingCoords = geom.coordinates.map(c => [...c]); // deep copy [lng,lat]

  polyline = L.polyline(workingCoords.map(c => [c[1], c[0]]), {
    color: '#005696', weight: 5, opacity: 0.9
  }).addTo(map);

  map.fitBounds(polyline.getBounds(), { padding: [50, 50] });

  // Vertex handles (interior points only; start/end are the ep markers)
  vertexGroup = L.layerGroup().addTo(map);
  workingCoords.forEach((coord, i) => {
    if (i === 0 || i === workingCoords.length - 1) return;

    const vm = L.marker([coord[1], coord[0]], {
      icon: mkIcon('vertex-handle'),
      draggable: true,
      zIndexOffset: 100,
    }).addTo(vertexGroup);

    vm.on('drag', e => {
      const ll = e.target.getLatLng();
      workingCoords[i] = [ll.lng, ll.lat];
      polyline.setLatLngs(workingCoords.map(c => [c[1], c[0]]));
    });

    vm.on('dragend', () => {
      saveWorkingCoords(item);
      updateInfoMeta(item.entry());
    });
  });

  updateInfoMeta(entry);
}

function updateInfoMeta(entry) {
  if (!entry.route) return;
  const s = entry.route.properties?.summary;
  if (s) {
    document.getElementById('info-meta').textContent =
      `${fmtDist(s.distance)}  ·  ${fmtDur(s.duration)}`;
  }
}

// ── Save working coords back into routeTable ──────────────────────────────────

function saveWorkingCoords(item) {
  const entry = item.entry();
  if (!entry.route || !workingCoords) return;
  entry.route.geometry.coordinates = workingCoords.map(c => [...c]);

  // Recalculate distance from the edited coordinates
  const latlngs = workingCoords.map(c => [c[1], c[0]]);
  let dist = 0;
  for (let i = 1; i < latlngs.length; i++) dist += haversine(latlngs[i-1], latlngs[i]);
  if (entry.route.properties?.summary) entry.route.properties.summary.distance = Math.round(dist);

  markDirty();
  renderList();
}

// ── Re-fetch from API ─────────────────────────────────────────────────────────

document.getElementById('btn-refetch').addEventListener('click', async () => {
  if (selectedIdx < 0) return;
  const item  = filtered[selectedIdx];
  const entry = item.entry();

  const startC = entry.start?.coords ?? entry.entrance?.coords;
  const endC   = entry.end?.coords   ?? entry.lot?.coords;

  if (!startC || !endC) { toast('⚠ Missing start or end coordinates.'); return; }

  document.getElementById('btn-refetch').textContent = '↻ Fetching…';
  document.getElementById('btn-refetch').disabled = true;

  try {
    const res  = await fetch(`${ROUTE_API}?profile=foot-walking`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        coordinates: [[startC[1], startC[0]], [endC[1], endC[0]]],
      }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const feat = data?.features?.[0];
    if (!feat) throw new Error('No route returned');

    entry.route = {
      geometry:   feat.geometry,
      properties: { summary: feat.properties.summary, segments: feat.properties.segments },
    };

    markDirty();
    renderList();
    showRoute(item);
    toast(`✓ Route updated  (${fmtDist(feat.properties.summary.distance)})`);
  } catch (err) {
    toast('⚠ API error: ' + err.message);
  } finally {
    document.getElementById('btn-refetch').textContent = '↻ Re-fetch';
    document.getElementById('btn-refetch').disabled = false;
  }
});

// ── Use reverse route ─────────────────────────────────────────────────────────

document.getElementById('btn-reverse').addEventListener('click', () => {
  if (selectedIdx < 0) return;
  const item  = filtered[selectedIdx];
  if (item.type !== 'pair') { toast('Reverse only applies to building pairs.'); return; }

  const [a, b]  = item.key.split('|');
  const revKey  = `${b}|${a}`;
  const revEntry = routeTable.entrancePairs[revKey];

  if (!revEntry?.route) {
    toast(`⚠ No route found for ${revKey} either.`);
    return;
  }

  const entry = item.entry();
  const revCoords = [...revEntry.route.geometry.coordinates].reverse().map(c => [...c]);

  entry.route = {
    geometry:   { type: 'LineString', coordinates: revCoords },
    properties: {
      summary:  { ...revEntry.route.properties.summary },
      segments: revEntry.route.properties.segments,
    },
  };

  // Swap start/end to match
  const tmpStart = entry.start ? { ...entry.start } : null;
  if (entry.start && revEntry.end)   entry.start = { ...revEntry.end };
  if (entry.end   && revEntry.start) entry.end   = { ...revEntry.start };

  markDirty();
  renderList();
  showRoute(item);
  toast(`✓ Copied & reversed route from ${revKey}`);
});

// ── Clear route ───────────────────────────────────────────────────────────────

document.getElementById('btn-clear').addEventListener('click', () => {
  if (selectedIdx < 0) return;
  const item  = filtered[selectedIdx];
  const entry = item.entry();
  if (!entry.route) { toast('Route is already null.'); return; }

  if (!confirm(`Clear the route for "${item.key}"?\nThis sets it to null.`)) return;
  entry.route = null;
  markDirty();
  renderList();
  showRoute(item);
  toast('Route cleared.');
});

// ── Download ──────────────────────────────────────────────────────────────────

document.getElementById('btn-download').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(routeTable, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: 'routes.json' });
  a.click();
  URL.revokeObjectURL(url);
  isDirty = false;
  updateHeaderStats();
  toast('⬇ routes.json downloaded.');
});

// ── Dirty flag ────────────────────────────────────────────────────────────────

function markDirty() {
  isDirty = true;
  updateHeaderStats();
}
</script>
</body>
</html>
